<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>La Ganexa — Central de Influenciadores</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0E0F13;--surface:#16181F;--surface2:#1E2029;--surface3:#252733;
  --border:#2C2F3E;--border2:#383B4E;--text:#F0F1F5;--muted:#7B7F96;--muted2:#555870;
  --laranja:#E8952A;--laranja-d:#C8763A;
  --verde:#34A85A;--azul:#3B9EFF;--roxo:#A855F7;--rosa:#F472B6;--amarelo:#FBBF24;
  --gold-c:#FBBF24;--gold-bg:#1F1708;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 15% 0%,rgba(232,149,42,.07) 0%,transparent 50%),
                   radial-gradient(ellipse at 85% 100%,rgba(59,158,255,.04) 0%,transparent 50%)}
nav{background:rgba(22,24,31,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;
  position:sticky;top:0;z-index:300;flex-wrap:wrap;gap:6px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--laranja)}
.nav-tabs{display:flex;gap:2px;flex-wrap:wrap}
.nav-tab{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;
  border:none;background:transparent;color:var(--muted);transition:all .18s}
.nav-tab.active{background:var(--laranja);color:#fff;font-weight:600}
.page{display:none;padding:20px 24px;max-width:1600px;margin:0 auto}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:15px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{background:var(--surface2);padding:8px 11px;text-align:left;color:var(--muted);text-transform:uppercase;font-size:9.5px}
td{padding:7px 11px;border-bottom:1px solid var(--border)}
[contenteditable="true"]:focus{outline:2px solid var(--laranja);background:var(--surface2);border-radius:4px}
.saving{color:var(--amarelo);font-size:10px;margin-left:5px;animation:pulse 1s infinite}
@keyframes pulse { 50% { opacity: 0.5; } }
</style>
</head>
<body>

<nav>
  <div class="logo-wrap" style="display:flex; align-items:center; gap:10px">
    <div style="background:var(--laranja); padding:5px; border-radius:8px">🥜</div>
    <div class="logo-text">La Ganexa</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard',this)">🎯 Dashboard</button>
    <button class="nav-tab" onclick="showPage('vendas',this)">💰 Vendas Reais</button>
    <button class="nav-tab" onclick="showPage('influenciadores',this)">👥 Influenciadores</button>
    <button class="nav-tab" onclick="showPage('kits',this)">📦 Kits</button>
    <button class="nav-tab" onclick="showPage('checklist',this)">✅ Checklist</button>
  </div>
  <span style="font-size:10px; color:var(--verde)" id="api-status">● API CONECTADA</span>
</nav>

<div id="page-dashboard" class="page active">
  <h2 style="margin-bottom:20px; font-family:'Syne'">Dashboard de Performance</h2>
  <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px" id="kpi-main">
      </div>
</div>

<div id="page-vendas" class="page">
  <h2 style="margin-bottom:20px; font-family:'Syne'">Vendas Yampi (Tempo Real)</h2>
  <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px">
      <div class="card">
          <div style="padding:15px; border-bottom:1px solid var(--border)">🏆 Ranking Cupons</div>
          <div id="ranking-list" style="padding:15px"></div>
      </div>
      <div class="card">
          <div style="padding:15px; border-bottom:1px solid var(--border)">📄 Log de Pedidos</div>
          <table id="sales-table">
              <thead><tr><th>Pedido</th><th>Cupom</th><th>Valor</th><th>ROI</th></tr></thead>
              <tbody id="sales-tbody"></tbody>
          </table>
      </div>
  </div>
</div>

<div id="page-influenciadores" class="page">
  <h2 style="margin-bottom:20px; font-family:'Syne'">Gestão de Base</h2>
  <div class="card">
    <table>
      <thead>
        <tr><th>Nome</th><th>Cupom</th><th>Custo (R$)</th><th>Observações</th></tr>
      </thead>
      <tbody id="inf-tbody"></tbody>
    </table>
  </div>
</div>

<div id="page-kits" class="page">
    <h2 style="margin-bottom:20px; font-family:'Syne'">📦 Logística de Kits</h2>
    <div id="kits-container" class="card" style="padding:20px">Carregando...</div>
</div>

<div id="page-checklist" class="page">
    <h2 style="margin-bottom:20px; font-family:'Syne'">✅ Checklist Operacional</h2>
    <div class="card" style="padding:20px">Gerencie suas tarefas diárias.</div>
</div>

<script>
// --- BANCO DE DADOS LOCAL (CARREGADO INICIALMENTE) ---
const INF = [
    {nome:"Adriele Wally", handle:"adrimulling", coupon:"DRI10", cost: 150, obs: "Cobrado 04/03"},
    {nome:"Ahmad Jamal", handle:"doutorahmad", coupon:"DR5", cost: 500, obs: "GOLD"},
    // Adicione os outros aqui...
];

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if(name === 'vendas') loadRealData();
}

// --- FUNÇÃO PARA SALVAR NO SUPABASE (EDITÁVEL) ---
async function saveData(handle, field, element) {
    const value = element.innerText.trim();
    const statusEl = document.getElementById('api-status');
    
    element.classList.add('saving');
    
    try {
        const response = await fetch('/api/update-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ handle, field, value })
        });
        
        if(response.ok) {
            element.style.color = "#34D399";
            setTimeout(() => { element.style.color = ""; element.classList.remove('saving'); }, 2000);
        }
    } catch (err) {
        console.error("Erro ao salvar:", err);
        element.style.color = "#F87171";
    }
}

// --- RENDERIZAR TABELA DE GESTÃO ---
function renderInfTable() {
    const tbody = document.getElementById('inf-tbody');
    tbody.innerHTML = INF.map(i => `
        <tr>
            <td style="font-weight:bold">${i.nome}</td>
            <td style="color:var(--laranja)">${i.coupon}</td>
            <td contenteditable="true" onblur="saveData('${i.handle}', 'cost', this)">${i.cost || 0}</td>
            <td contenteditable="true" onblur="saveData('${i.handle}', 'obs', this)">${i.obs || ''}</td>
        </tr>
    `).join('');
}

// --- CARREGAR DADOS REAIS DA API ---
async function loadRealData() {
    try {
        const [resRank, resSales] = await Promise.all([
            fetch('/api/dashboard/ranking'),
            fetch('/api/dashboard/recent-sales')
        ]);

        const ranking = await resRank.json();
        const sales = await resSales.json();

        // Ranking
        document.getElementById('ranking-list').innerHTML = ranking.map(item => `
            <div style="display:flex; justify-content:space-between; padding:10px; background:var(--surface2); border-radius:8px; margin-bottom:8px; border:1px solid var(--border)">
                <div><b>${item.coupon}</b><br><small>${item.sales_count} vendas</small></div>
                <div style="text-align:right"><b>R$ ${item.total.toFixed(2)}</b><br><small style="color:${item.status === 'verde' ? 'var(--verde)' : 'var(--rosa)'}">ROI: ${item.status}</small></div>
            </div>
        `).join('');

        // Tabela Log
        document.getElementById('sales-tbody').innerHTML = sales.map(s => `
            <tr>
                <td>#${s.order_id}</td>
                <td style="color:var(--laranja)">${s.coupon}</td>
                <td>R$ ${s.value.toFixed(2)}</td>
                <td style="color:${s.roi_status === 'verde' ? 'var(--verde)' : 'var(--rosa)'}">${s.roi_status}</td>
            </tr>
        `).join('');

    } catch (err) {
        document.getElementById('api-status').innerHTML = "● ERRO API";
        document.getElementById('api-status').style.color = "red";
    }
}

window.onload = () => {
    renderInfTable();
    loadRealData();
};
</script>
</body>
</html>
